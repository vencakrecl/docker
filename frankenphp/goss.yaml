# Runtime checks for a running frankenphp container (dgoss run ...).
# Runs unprivileged as www-data; SERVER_NAME=:8080 serves plain HTTP on 8080.
command:
  runs-as-non-root:
    exec: id -u
    exit-status: 0
    stdout:
      - "!/^0$/"
  php-cli-executes:
    exec: php -r 'echo 40 + 2;'
    exit-status: 0
    stdout: ["42"]
  memory-limit:
    exec: php -r 'echo ini_get("memory_limit");'
    exit-status: 0
    stdout: ["128M"]
http:
  http://localhost:8080/:
    status: 200
    timeout: 5000
