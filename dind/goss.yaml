# Runtime checks for a running rootless dind container (dgoss run --privileged ...).
# The daemon runs as the unprivileged "rootless" user (uid 1000) via rootlesskit.
# NB: goss renders goss.yaml (comments included) through Go templating first, so
# avoid Go-template brace syntax anywhere here.
# Rootless dockerd listens on a per-user socket, so DOCKER_HOST must point at it;
# `docker version` returns non-zero if the daemon is unreachable.
process:
  dockerd:
    running: true
command:
  runs-as-non-root:
    exec: id -u
    exit-status: 0
    stdout:
      - "!/^0$/"
  docker-server:
    exec: sh -c 'DOCKER_HOST=unix:///run/user/1000/docker.sock docker version'
    exit-status: 0
    stdout:
      - Server
