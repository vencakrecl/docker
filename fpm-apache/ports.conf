# Replaces the stock Debian ports.conf (Listen 80), which apache2.conf `Include`s. We run
# non-root, so we listen on 8080 and drop the stock TLS (443) blocks - no in-image TLS here
# (terminate upstream). Alpine's Listen lives inline in httpd.conf (handled there), and it
# doesn't Include ports.conf, so this file is inert on Alpine.
Listen 8080
