name: Deps Check

# Weekly freshness check for the hand-pinned tools that Renovate/Dependabot can't fully
# manage (gcloud, azure-cli) plus a cross-check of the Renovate-managed ones. Reports via
# a single reused GitHub issue; opening bump PRs is Renovate's job (.github/renovate.json).
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check dependency freshness
        id: check
        run: |
          set +e
          out=$(bash scripts/deps.sh check)
          code=$?
          echo "$out"
          {
            echo 'report<<REPORT_EOF'
            echo "$out"
            echo 'REPORT_EOF'
          } >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 3 ]; then
            echo "outdated=true" >> "$GITHUB_OUTPUT"
          elif [ "$code" -eq 0 ]; then
            echo "outdated=false" >> "$GITHUB_OUTPUT"
          else
            exit "$code" # a real error (network/parse), not just "outdated"
          fi

      - name: Open or update the tracking issue
        if: steps.check.outputs.outdated == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPORT: ${{ steps.check.outputs.report }}
        run: |
          title="Outdated pinned dependencies"
          body=$(printf 'One or more hand-pinned tools are behind upstream:\n\n```\n%s\n```\n\nRenovate opens bump PRs for s6-overlay/composer/pie/castor/goss; after merging one run `make bump-digests`. For gcloud edit `GCLOUD_VERSION` + `make bump-digests`; for azure-cli regenerate `dind/azure-cli-requirements.txt` via `dind/gen-azure-hashes.sh`.\n\n_Automated by `.github/workflows/deps-check.yml`._' "$REPORT")
          gh label create dependencies --color 0366d6 --force >/dev/null 2>&1 || true
          num=$(gh issue list --state open --search "$title in:title" --json number,title \
                  --jq "map(select(.title==\"$title\")) | .[0].number // empty")
          if [ -n "$num" ]; then
            gh issue edit "$num" --body "$body"
            echo "Updated issue #$num"
          else
            gh issue create --title "$title" --label dependencies --body "$body"
          fi
