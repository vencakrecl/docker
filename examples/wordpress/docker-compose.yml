# WordPress on fpm-nginx, built by DERIVING from the fpm-nginx image (see ./Dockerfile).
# The extra extensions (mysqli, gd) are added downstream with the image's baked-in
# `helper` - not build-args - which is the intended way to extend these images as a base.
#
# From the repo root:
#   make fpm-nginx-alpine                        # build the base image the Dockerfile derives from
#   make example-wordpress                        # download WP core into wordpress/app
#   docker compose -f examples/wordpress/docker-compose.yml up --build -d
#   curl -L localhost:8081/
#   docker compose -f examples/wordpress/docker-compose.yml down
#
# WordPress serves from the project root (docroot = /app) and needs a database, so a
# MariaDB `db` service is included and a fresh core reaches the setup wizard. This uses
# plain WordPress core (not the official `wordpress` image), so there is no entrypoint to
# generate wp-config.php - complete setup in the browser wizard with:
#   database host=db  name=wordpress  user=wordpress  password=wordpress
name: example-wordpress

services:
  fpm-nginx:
    # Derives from fpm-nginx and adds mysqli + gd (see ./Dockerfile). The build context
    # is this folder - `helper` is already in the base image, nothing to COPY from the repo.
    build:
      context: .
      # Override the base tag if you built a different PHP version, e.g.:
      # args: { BASE_IMAGE: fpm-nginx:8.4-alpine }
    # PHP is tuned via the image's env knobs (common/php.ini), not a mounted php.ini.
    environment:
      SERVER_ROOT: /app
      PHP_MEMORY_LIMIT: 256M
      PHP_UPLOAD_MAX_FILESIZE: 64M
      PHP_POST_MAX_SIZE: 128M
      PHP_MAX_INPUT_VARS: 3000
      SERVER_TIMEOUT: 300          # web-server backend request timeout (seconds)
    volumes:
      - ./app:/app
    depends_on:
      - db
    ports: ["8081:8080"]
    restart: unless-stopped

  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: wordpress
      MARIADB_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - db-data:/var/lib/mysql
    restart: unless-stopped

volumes:
  db-data:
