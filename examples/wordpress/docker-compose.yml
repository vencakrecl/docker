# WordPress on all three web images. Install the core first (from the repo root):
#   make example-wordpress
#   docker compose -f examples/wordpress/docker-compose.yml up --build -d
#   curl -L localhost:8081/   # fpm-nginx   (8082 fpm-apache, 8083 frankenphp)
#   docker compose -f examples/wordpress/docker-compose.yml down
#
# WordPress serves from the project root (docroot = /app) and needs a database plus
# the mysqli + gd extensions (not in the base images). The extensions are built via
# the images' PHP_EXTENSIONS/PHP_EXTENSION_PACKAGES build args (below), and a MariaDB
# `db` service is included, so a fresh core reaches the setup wizard.
#
# This uses plain WordPress core (not the official `wordpress` image), so there is no
# entrypoint to generate wp-config.php - complete setup in the browser wizard with:
#   database host=db  name=wordpress  user=wordpress  password=wordpress
name: example-wordpress

# Build args shared by the three web services: install mysqli (DB) and gd (images).
x-ext: &ext
  PHP_EXTENSIONS: "mysqli gd"
  PHP_EXTENSION_PACKAGES: "libpng-dev"

x-app: &app
  environment:
    SERVER_ROOT: /app
  volumes:
    - ./app:/app
    - ./php.ini:/usr/local/etc/php/conf.d/zzz-app.ini:ro
  depends_on:
    - db
  restart: unless-stopped

services:
  fpm-nginx:
    <<: *app
    build: { context: ../.., dockerfile: fpm-nginx/Dockerfile, args: *ext }
    ports: ["8081:8080"]
  fpm-apache:
    <<: *app
    build: { context: ../.., dockerfile: fpm-apache/Dockerfile, args: *ext }
    ports: ["8082:8080"]
  frankenphp:
    <<: *app
    build: { context: ../.., dockerfile: frankenphp/Dockerfile, args: *ext }
    ports: ["8083:8080"]

  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: wordpress
      MARIADB_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - db-data:/var/lib/mysql
    restart: unless-stopped

volumes:
  db-data:
