# Runtime checks for a running frankenphp container (dgoss run ...).
# Runs unprivileged as www-data; SERVER_NAME=:8080 serves plain HTTP on 8080.
command:
  runs-as-non-root:
    exec: id -u
    exit-status: 0
    stdout:
      - "!/^0$/"
  php-cli-executes:
    exec: php -r 'echo 40 + 2;'
    exit-status: 0
    stdout: ["42"]
  # Default extension set baked in at build (two per install manager: docker-php-ext,
  # PECL, PIE). Downstream apps extend these by deriving + `helper` (see examples/wordpress).
  default-extensions:
    exec: php -m
    exit-status: 0
    stdout: ["mysqli", "bcmath", "redis", "apcu", "ds", "opentelemetry"]
  # The container HEALTHCHECK probe: GETs $HEALTHCHECK_PATH and exits 0 on 2xx,
  # exercising FrankenPHP -> PHP end-to-end.
  healthcheck:
    exec: healthcheck
    exit-status: 0
  # Compression: Caddy's `encode zstd br gzip` (Caddyfile), brotli preferred (gzip fallback).
  # Write a compressible asset over Caddy's 512B minimum_length and assert Content-Encoding br.
  compression-brotli:
    exec: |
      head -c 1024 /dev/zero | tr '\0' x > ${SERVER_ROOT}/__goss_compress.css
      curl -s -D - -o /dev/null -H 'Accept-Encoding: br, gzip' http://127.0.0.1:8080/__goss_compress.css
    exit-status: 0
    stdout: ["Content-Encoding: br"]
  # One test per common/php.ini env knob (set inline; php re-parses config each run).
  # Proves the ${VAR:-default} expansion in our php.ini works. frankenphp embeds PHP
  # (no php-fpm), so there are no PHP_FPM_* knobs.
  env-php-memory-limit:
    exec: env PHP_MEMORY_LIMIT=512M php -r 'echo ini_get("memory_limit");'
    exit-status: 0
    stdout: ["512M"]
  env-php-upload-max-filesize:
    exec: env PHP_UPLOAD_MAX_FILESIZE=64M php -r 'echo ini_get("upload_max_filesize");'
    exit-status: 0
    stdout: ["64M"]
  env-php-post-max-size:
    exec: env PHP_POST_MAX_SIZE=128M php -r 'echo ini_get("post_max_size");'
    exit-status: 0
    stdout: ["128M"]
  env-php-max-input-vars:
    exec: env PHP_MAX_INPUT_VARS=5000 php -r 'echo ini_get("max_input_vars");'
    exit-status: 0
    stdout: ["5000"]
  env-php-date-timezone:
    exec: env PHP_DATE_TIMEZONE=Europe/Prague php -r 'echo ini_get("date.timezone");'
    exit-status: 0
    stdout: ["Europe/Prague"]
  env-php-opcache-memory-consumption:
    exec: env PHP_OPCACHE_MEMORY_CONSUMPTION=256 php -r 'echo ini_get("opcache.memory_consumption");'
    exit-status: 0
    stdout: ["256"]
  env-php-opcache-max-accelerated-files:
    exec: env PHP_OPCACHE_MAX_ACCELERATED_FILES=32531 php -r 'echo ini_get("opcache.max_accelerated_files");'
    exit-status: 0
    stdout: ["32531"]
  env-php-opcache-interned-strings-buffer:
    exec: env PHP_OPCACHE_INTERNED_STRINGS_BUFFER=32 php -r 'echo ini_get("opcache.interned_strings_buffer");'
    exit-status: 0
    stdout: ["32"]
  env-php-opcache-validate-timestamps:
    exec: env PHP_OPCACHE_VALIDATE_TIMESTAMPS=0 php -r 'echo ini_get("opcache.validate_timestamps");'
    exit-status: 0
    stdout: ["0"]
  env-php-opcache-enable-cli:
    exec: env PHP_OPCACHE_ENABLE_CLI=1 php -r 'echo ini_get("opcache.enable_cli");'
    exit-status: 0
    stdout: ["1"]
  env-php-opcache-preload:
    exec: env PHP_OPCACHE_PRELOAD=/app/config/preload.php php -r 'echo ini_get("opcache.preload");'
    exit-status: 0
    stdout: ["/app/config/preload.php"]
  env-php-opcache-preload-user:
    exec: env PHP_OPCACHE_PRELOAD_USER=app php -r 'echo ini_get("opcache.preload_user");'
    exit-status: 0
    stdout: ["app"]
  env-php-realpath-cache-size:
    exec: env PHP_REALPATH_CACHE_SIZE=8192K php -r 'echo ini_get("realpath_cache_size");'
    exit-status: 0
    stdout: ["8192K"]
  env-php-realpath-cache-ttl:
    exec: env PHP_REALPATH_CACHE_TTL=600 php -r 'echo ini_get("realpath_cache_ttl");'
    exit-status: 0
    stdout: ["600"]
  # --- Error-logging knobs (common/php.ini): errors go to stderr, display_errors off by
  # default. Set inline, asserted via ini_get. error_reporting is set to a fixed number
  # (not E_ALL, whose numeric value is PHP-version-specific). ---
  env-php-log-errors:
    exec: env PHP_LOG_ERRORS=Off php -r 'echo ini_get("log_errors");'
    exit-status: 0
    stdout: ["Off"]
  env-php-error-log:
    exec: env PHP_ERROR_LOG=/tmp/php_errors.log php -r 'echo ini_get("error_log");'
    exit-status: 0
    stdout: ["/tmp/php_errors.log"]
  env-php-display-errors:
    exec: env PHP_DISPLAY_ERRORS=On php -r 'echo ini_get("display_errors");'
    exit-status: 0
    stdout: ["On"]
  env-php-display-startup-errors:
    exec: env PHP_DISPLAY_STARTUP_ERRORS=On php -r 'echo ini_get("display_startup_errors");'
    exit-status: 0
    stdout: ["On"]
  env-php-error-reporting:
    exec: env PHP_ERROR_REPORTING=0 php -r 'echo ini_get("error_reporting");'
    exit-status: 0
    stdout: ["0"]
http:
  # Default HEALTHCHECK target: Caddy static 200 (no PHP runs; frankenphp has no FPM).
  http://localhost:8080/healthz:
    status: 200
    timeout: 5000
  # End-to-end: / serves index.php through frankenphp -> PHP.
  http://localhost:8080/:
    status: 200
    body: ["Hello, World!"]
    timeout: 5000
  # Front-controller fallback: an unknown path routes to index.php (not 404), via Caddy's
  # php_server try_files. Same guarantee as nginx try_files / Apache mod_rewrite.
  http://localhost:8080/no/such/route:
    status: 200
    body: ["Hello, World!"]
    timeout: 5000
