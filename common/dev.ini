; Dev-image PHP config (the `-dev` image variant only). Tunes the xdebug/pcov/spx
; dev extensions installed by `helper install-dev-tools`. Copied to
; $PHP_INI_DIR/conf.d/zz-dev.ini - the zz- prefix loads it *after* the extension
; enabling inis (docker-php-ext-*.ini), so each extension is registered before its
; directives are read. Values are env-overridable at runtime (PHP expands ${VAR:-default}
; at parse time), same as the shared php.ini.

; Xdebug - OFF by default so the dev image carries zero xdebug overhead until you opt
; in. Enable per run, e.g. `docker run -e XDEBUG_MODE=debug,coverage ...` (xdebug also
; reads the XDEBUG_MODE env var natively). client_host targets the host from a
; container; on Linux without Docker Desktop set it to your host IP.
xdebug.mode = ${XDEBUG_MODE:-off}
xdebug.client_host = ${XDEBUG_CLIENT_HOST:-host.docker.internal}
xdebug.start_with_request = ${XDEBUG_START_WITH_REQUEST:-yes}

; PCOV - fast line-coverage driver, idle until a test runner starts collecting. Leave
; xdebug.mode without `coverage` when using pcov; do not drive coverage with both.
pcov.enabled = ${PCOV_ENABLED:-1}

; SPX - sampling profiler with a built-in web UI, dormant until activated. The HTTP UI
; is gated by a key + IP allowlist; keep the allowlist tight and change the key before
; exposing it. For CLI profiling run with `SPX_ENABLED=1`.
spx.data_dir = ${SPX_DATA_DIR:-/tmp/spx}
spx.http_enabled = ${SPX_HTTP_ENABLED:-1}
spx.http_key = ${SPX_HTTP_KEY:-dev}
spx.http_ip_whitelist = ${SPX_HTTP_IP_WHITELIST:-127.0.0.1}
