ServerName localhost
DirectoryIndex index.php index.html

<VirtualHost *:8080>
    # ${SERVER_ROOT} is expanded from the environment by httpd at config-parse
    # time, so the docroot is overridable at runtime (docker run -e SERVER_ROOT=...).
    DocumentRoot ${SERVER_ROOT}

    <Directory ${SERVER_ROOT}>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Hand .php requests to PHP-FPM listening on 127.0.0.1:9000.
    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://127.0.0.1:9000"
    </FilesMatch>

    # FPM ping health endpoint (default HEALTHCHECK_PATH): proxied straight to php-fpm,
    # which answers ping.path (php-fpm.conf) with 200 and runs no app code. mod_proxy
    # sets SCRIPT_NAME=/healthz to match ping.path.
    <IfModule proxy_module>
        ProxyPass "/healthz" "fcgi://127.0.0.1:9000"
    </IfModule>

    # Wait on php-fpm at least as long as PHP may run, so Apache doesn't 504 before
    # PHP's own timeout. ${SERVER_TIMEOUT} is an image ENV (default 30). Guarded by
    # IfModule for safety (mod_proxy is present on both distros: Debian via a2enmod,
    # Alpine via the apache2-proxy package installed in the Dockerfile).
    <IfModule proxy_module>
        ProxyTimeout ${SERVER_TIMEOUT}
    </IfModule>
</VirtualHost>
