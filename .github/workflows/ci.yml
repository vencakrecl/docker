name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default; jobs that push to GHCR opt into packages: write.
permissions:
  contents: read

env:
  GOSS_VERSION: v0.4.9
  DOCKER_VERSION: "29" # dind tag (matches the Makefile default)

jobs:
  # Single source of truth for the image x PHP-version list, shared by
  # build-php-image and release-php-image via fromJSON. Edit versions here only.
  matrix:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.set.outputs.targets }}
    steps:
      # Single-line JSON (a multi-line $GITHUB_OUTPUT value would need <<DELIM).
      - id: set
        run: >-
          echo 'targets=[
          {"image":"fpm-nginx","php":"8.5"},
          {"image":"fpm-apache","php":"8.5"},
          {"image":"frankenphp","php":"8.5"}
          ]' >> "$GITHUB_OUTPUT"

  # One parallel job per (target x arch x os). Build, test, and (on main) push the
  # tested image under a per-arch tag; release-php-image assembles the multi-arch tag.
  build-php-image:
    needs: matrix
    name: ${{ matrix.target.image }} ${{ matrix.target.php }}-${{ matrix.os }}${{ matrix.variant == 'dev' && '-dev' || '' }} (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ${{ matrix.target.image }}
      PHP: ${{ matrix.target.php }}
      OS: ${{ matrix.os }}
      VARIANT: ${{ matrix.variant }}
      # make target + local tag: fpm-nginx-alpine / 8.5-alpine (prod), -dev forms for dev.
      MAKE_TARGET: ${{ matrix.target.image }}${{ matrix.variant == 'dev' && '-dev' || '' }}-${{ matrix.os }}
      TAG: ${{ matrix.target.php }}-${{ matrix.os }}${{ matrix.variant == 'dev' && '-dev' || '' }}
      GHCR_REF: ghcr.io/${{ github.repository_owner }}/${{ matrix.target.image }}:${{ matrix.target.php }}-${{ matrix.os }}${{ matrix.variant == 'dev' && '-dev' || '' }}-${{ matrix.arch }}
      # Docker Hub mirror (same per-arch tag); pushed only when DOCKERHUB_USERNAME is set.
      DOCKERHUB_REF: docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ matrix.target.image }}:${{ matrix.target.php }}-${{ matrix.os }}${{ matrix.variant == 'dev' && '-dev' || '' }}-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        os: [alpine, debian]
        variant: [prod, dev]
        target: ${{ fromJSON(needs.matrix.outputs.targets) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Install goss + dgoss
        run: |
          arch=$(dpkg --print-architecture)
          sudo curl -fsSL "https://github.com/goss-org/goss/releases/download/${GOSS_VERSION}/goss-linux-${arch}" -o /usr/local/bin/goss
          sudo curl -fsSL "https://raw.githubusercontent.com/goss-org/goss/${GOSS_VERSION}/extras/dgoss/dgoss" -o /usr/local/bin/dgoss
          sudo chmod +x /usr/local/bin/goss /usr/local/bin/dgoss
      - name: Build
        run: make "$MAKE_TARGET" PHP_VERSION="$PHP"
      - name: Test (goss)
        run: |
          cd "$IMAGE"
          if [ "$VARIANT" = dev ]; then
            # dev variant uses the image's goss.dev.yaml (asserts the toolbox is present)
            GOSS_FILE=goss.dev.yaml GOSS_SLEEP=8 dgoss run "$IMAGE:$TAG"
          else
            GOSS_SLEEP=8 dgoss run "$IMAGE:$TAG"
          fi
      # Regression guard for graceful shutdown: `docker stop` must stop the container
      # cleanly, not get SIGKILLed at the timeout. The s6 web images override the
      # base's STOPSIGNAL (SIGQUIT->SIGTERM) so s6's shutdown handler fires; frankenphp
      # (no s6) stops on the default SIGTERM. Fail on exit 137 or a timeout-length stop.
      - name: Graceful stop
        run: |
          cid=$(docker run -d "$IMAGE:$TAG")
          sleep 8
          start=$(date +%s)
          docker stop -t 15 "$cid"
          elapsed=$(( $(date +%s) - start ))
          code=$(docker inspect -f '{{.State.ExitCode}}' "$cid")
          docker rm -f "$cid" >/dev/null || true
          echo "stop: elapsed=${elapsed}s exit=${code}"
          if [ "$code" = "137" ] || [ "$elapsed" -ge 12 ]; then
            echo "::error::$IMAGE:$TAG did not stop gracefully (exit=$code, ${elapsed}s)"
            exit 1
          fi
      - name: Log in to GHCR
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push (this arch)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          docker tag "$IMAGE:$TAG" "$GHCR_REF"
          docker push "$GHCR_REF"
      - name: Log in to Docker Hub
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push to Docker Hub (this arch)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DOCKERHUB_USERNAME != '' }}
        run: |
          docker tag "$IMAGE:$TAG" "$DOCKERHUB_REF"
          docker push "$DOCKERHUB_REF"

  build-dind-image:
    # suffix "" is plain rootless dind; -aws/-gcloud/-azure add a cloud CLI (see
    # dind/Dockerfile CLOUD arg). make target / test target / tag all carry the suffix.
    name: dind${{ matrix.suffix }} (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    env:
      GHCR_REF: ghcr.io/${{ github.repository_owner }}/dind
      DOCKERHUB_REF: docker.io/${{ vars.DOCKERHUB_USERNAME }}/dind
      ARCH: ${{ matrix.arch }}
      SUFFIX: ${{ matrix.suffix }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        suffix: ["", "-aws", "-gcloud", "-azure"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Install goss + dgoss
        run: |
          arch=$(dpkg --print-architecture)
          sudo curl -fsSL "https://github.com/goss-org/goss/releases/download/${GOSS_VERSION}/goss-linux-${arch}" -o /usr/local/bin/goss
          sudo curl -fsSL "https://raw.githubusercontent.com/goss-org/goss/${GOSS_VERSION}/extras/dgoss/dgoss" -o /usr/local/bin/dgoss
          sudo chmod +x /usr/local/bin/goss /usr/local/bin/dgoss
      # ubuntu-24.04 runners set kernel.apparmor_restrict_unprivileged_userns=1,
      # which blocks rootlesskit's user-namespace creation (fork/exec /proc/self/exe:
      # operation not permitted) even inside a --privileged container - the restriction
      # is a host kernel sysctl, not lifted by the container's apparmor=unconfined.
      # rootlesskit lives inside the dind image, so a per-binary AppArmor profile
      # doesn't apply; disable the restriction on this ephemeral runner instead.
      - name: Allow unprivileged user namespaces (rootless dind)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - name: Build + test
        run: make "test-dind${SUFFIX}"
      - name: Log in to GHCR
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push (this arch)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          tag="${DOCKER_VERSION}-rootless${SUFFIX}"
          ref="$GHCR_REF:${tag}-${ARCH}"
          docker tag "dind:${tag}" "$ref"
          docker push "$ref"
      - name: Log in to Docker Hub
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push to Docker Hub (this arch)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DOCKERHUB_USERNAME != '' }}
        run: |
          tag="${DOCKER_VERSION}-rootless${SUFFIX}"
          ref="$DOCKERHUB_REF:${tag}-${ARCH}"
          docker tag "dind:${tag}" "$ref"
          docker push "$ref"

  # Assemble the per-arch tags pushed by build-php-image into one multi-arch tag.
  release-php-image:
    needs: [matrix, build-php-image]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    name: release ${{ matrix.target.image }} ${{ matrix.target.php }}-${{ matrix.os }}${{ matrix.variant == 'dev' && '-dev' || '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        os: [alpine, debian]
        variant: [prod, dev]
        target: ${{ fromJSON(needs.matrix.outputs.targets) }}
    steps:
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        env:
          BASE: ghcr.io/${{ github.repository_owner }}/${{ matrix.target.image }}:${{ matrix.target.php }}-${{ matrix.os }}${{ matrix.variant == 'dev' && '-dev' || '' }}
        run: docker buildx imagetools create -t "$BASE" "$BASE-amd64" "$BASE-arm64"
      - name: Log in to Docker Hub
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create multi-arch manifest (Docker Hub)
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        env:
          BASE: docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ matrix.target.image }}:${{ matrix.target.php }}-${{ matrix.os }}${{ matrix.variant == 'dev' && '-dev' || '' }}
        run: docker buildx imagetools create -t "$BASE" "$BASE-amd64" "$BASE-arm64"

  release-dind-image:
    needs: build-dind-image
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    name: release dind${{ matrix.suffix }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        suffix: ["", "-aws", "-gcloud", "-azure"]
    steps:
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        env:
          REPO: ghcr.io/${{ github.repository_owner }}/dind
          SUFFIX: ${{ matrix.suffix }}
        run: |
          base="$REPO:${DOCKER_VERSION}-rootless${SUFFIX}"
          docker buildx imagetools create -t "$base" "$base-amd64" "$base-arm64"
      - name: Log in to Docker Hub
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create multi-arch manifest (Docker Hub)
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        env:
          REPO: docker.io/${{ vars.DOCKERHUB_USERNAME }}/dind
          SUFFIX: ${{ matrix.suffix }}
        run: |
          base="$REPO:${DOCKER_VERSION}-rootless${SUFFIX}"
          docker buildx imagetools create -t "$base" "$base-amd64" "$base-arm64"
