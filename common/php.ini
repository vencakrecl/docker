; Shared PHP configuration, copied into $PHP_INI_DIR/conf.d on every PHP image.
;
; PHP expands ${...} to the current environment when it parses ini files at
; startup, and supports a shell-style ${VAR:-default} fallback. So every setting
; here carries its own default and is overridable at runtime with no rebuild, e.g.
; `docker run -e PHP_MEMORY_LIMIT=512M ...`. Defaults match PHP's own (bar an
; explicit UTC timezone). Per-framework tuning is done via these env vars in
; examples/<fw>/docker-compose.yml (not a mounted php.ini).
; To add a knob: add `key = ${PHP_ENV_VAR:-default}` here and an env-* goss test.

memory_limit = ${PHP_MEMORY_LIMIT:-128M}
upload_max_filesize = ${PHP_UPLOAD_MAX_FILESIZE:-2M}
post_max_size = ${PHP_POST_MAX_SIZE:-8M}
max_input_vars = ${PHP_MAX_INPUT_VARS:-1000}
date.timezone = ${PHP_DATE_TIMEZONE:-UTC}
; Applies to the web SAPI (fpm/frankenphp); the CLI SAPI always forces it to 0, which
; is why - unlike the other knobs - it has no `php -r ini_get` goss test (unverifiable
; there). The ${ENV} expansion itself is the same as the tested knobs.
max_execution_time = ${PHP_MAX_EXECUTION_TIME:-30}

; OPcache (the base image enables it); defaults are PHP's own. Set validate_timestamps
; to 0 in production (and reset OPcache on deploy) so PHP stops stat()-ing every file.
opcache.memory_consumption = ${PHP_OPCACHE_MEMORY_CONSUMPTION:-128}
opcache.max_accelerated_files = ${PHP_OPCACHE_MAX_ACCELERATED_FILES:-10000}
opcache.interned_strings_buffer = ${PHP_OPCACHE_INTERNED_STRINGS_BUFFER:-8}
opcache.validate_timestamps = ${PHP_OPCACHE_VALIDATE_TIMESTAMPS:-1}
realpath_cache_size = ${PHP_REALPATH_CACHE_SIZE:-4096K}
realpath_cache_ttl = ${PHP_REALPATH_CACHE_TTL:-120}
