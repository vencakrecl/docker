; Shared PHP configuration, copied into $PHP_INI_DIR/conf.d on every PHP image.
;
; PHP expands ${...} to the current environment when it parses ini files at
; startup, and supports a shell-style ${VAR:-default} fallback. So settings here
; carry their own default and are overridable at runtime with no rebuild, e.g.
; `docker run -e PHP_MEMORY=512M ...`.

memory_limit = ${PHP_MEMORY:-128M}
