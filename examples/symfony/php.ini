; Symfony performance recommendations.
; Source: https://symfony.com/doc/current/performance.html
; OPcache is tuned for Symfony's many fully-qualified class names. This is a dev
; example, so opcache.validate_timestamps is left at the default (1) and code edits
; show up immediately; in production set it to 0 and add opcache.preload
; (config/preload.php) + opcache.preload_user, resetting OPcache on each deploy.
opcache.memory_consumption = 256
opcache.max_accelerated_files = 32531
opcache.interned_strings_buffer = 32
realpath_cache_size = 4096K
realpath_cache_ttl = 600
