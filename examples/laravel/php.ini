; Laravel-oriented tuning. Laravel doesn't publish php.ini values; these are common
; community settings, with directive meanings per the PHP manual:
; https://www.php.net/manual/en/opcache.configuration.php
; A typical Laravel request loads 200-400 PHP files, so OPcache limits are raised.
; Dev example: opcache.validate_timestamps stays at the default (1) so edits reflect;
; in production set it to 0 and reload PHP-FPM on deploy.
memory_limit = 256M
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.enable_cli = 0
