# Laravel on all three web images. Install the app first (from the repo root):
#   make example-laravel
#   docker compose -f examples/laravel/docker-compose.yml up --build -d
#   curl localhost:8081/   # fpm-nginx   (8082 fpm-apache, 8083 frankenphp)
#   docker compose -f examples/laravel/docker-compose.yml down
#
# Laravel's docroot is public/. The app is mounted read-write (it writes to
# storage/ and bootstrap/cache/); on Linux match ownership via the image's
# USER_ID/GROUP_ID build args or `user:` here.
# PHP is tuned via the images' env knobs (common/php.ini), not a mounted php.ini.
name: example-laravel

x-app: &app
  environment:
    SERVER_ROOT: /app/public
    # The HEALTHCHECK defaults to /healthz (php-fpm ping) - proves the runtime is up
    # but not the app. Laravel ships a built-in /up route (200 if the app boots; also
    # dispatches a DiagnosingHealth event for DB/cache checks), so point the probe there
    # to validate the app itself, not just the runtime.
    HEALTHCHECK_PATH: /up
    PHP_MEMORY_LIMIT: 256M
    PHP_OPCACHE_INTERNED_STRINGS_BUFFER: 16
  volumes:
    - ./app:/app
  restart: unless-stopped

services:
  fpm-nginx:
    <<: *app
    build: { context: ../.., dockerfile: fpm-nginx/Dockerfile }
    ports: ["8081:8080"]
  fpm-apache:
    <<: *app
    build: { context: ../.., dockerfile: fpm-apache/Dockerfile }
    ports: ["8082:8080"]
  frankenphp:
    <<: *app
    build: { context: ../.., dockerfile: frankenphp/Dockerfile }
    ports: ["8083:8080"]
