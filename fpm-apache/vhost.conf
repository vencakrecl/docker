ServerName localhost
DirectoryIndex index.php index.html

# Send Apache's logs to the container's std streams (docker logs), not to files under
# /var/log/apache2. This global ErrorLog is last-wins over the base config's default.
# LogLevel reads ${APACHE_LOG_LEVEL}, a Dockerfile ENV (default warn) - httpd's ${VAR}
# expansion has no shell-style :-default, so the default lives in the image ENV (like
# ${SERVER_ROOT}/${SERVER_TIMEOUT}).
ErrorLog /dev/stderr
LogLevel ${APACHE_LOG_LEVEL}

# Response compression, brotli preferred with gzip fallback (mirrors nginx/Caddy). Apache
# won't self-negotiate br-vs-gzip: AddOutputFilterByType with both filters double-compresses,
# so we drive it through mod_filter, whose FilterChain dispatches to the first provider whose
# condition matches. Conditions are mutually exclusive (gzip only when the client didn't also
# offer br - real browsers send `gzip, deflate, br`) and scoped to text-like types so images/
# binaries aren't re-compressed. Modules enabled per distro (Debian a2enmod, Alpine LoadModule).
<IfModule mod_filter.c>
    FilterDeclare COMPRESS
    FilterProvider COMPRESS BROTLI_COMPRESS "%{req:Accept-Encoding} =~ /br/ && %{CONTENT_TYPE} =~ m#^(text/|application/(json|javascript|xml|rss\+xml|xhtml\+xml)|image/svg\+xml)#i"
    FilterProvider COMPRESS DEFLATE "%{req:Accept-Encoding} =~ /gzip/ && %{req:Accept-Encoding} !~ /br/ && %{CONTENT_TYPE} =~ m#^(text/|application/(json|javascript|xml|rss\+xml|xhtml\+xml)|image/svg\+xml)#i"
    FilterChain COMPRESS
</IfModule>

<VirtualHost *:8080>
    # ${SERVER_ROOT} is expanded from the environment by httpd at config-parse
    # time, so the docroot is overridable at runtime (docker run -e SERVER_ROOT=...).
    DocumentRoot ${SERVER_ROOT}

    # Access log to stdout (combined format), so requests show up in docker logs.
    CustomLog /dev/stdout combined

    <Directory ${SERVER_ROOT}>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Front-controller fallback (matches nginx try_files / Caddy php_server): serve an
        # existing file or directory as-is, else route to index.php (original query string
        # preserved). /healthz is unaffected - its ProxyPass claims the request before
        # per-directory rewrites run. An app's own public/.htaccess still overrides this.
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^ index.php [L]
        </IfModule>
    </Directory>

    # Hand .php requests to PHP-FPM listening on 127.0.0.1:9000.
    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://127.0.0.1:9000"
    </FilesMatch>

    # FPM ping health endpoint (default HEALTHCHECK_PATH): proxied straight to php-fpm,
    # which answers ping.path (php-fpm.conf) with 200 and runs no app code. mod_proxy
    # sets SCRIPT_NAME=/healthz to match ping.path.
    <IfModule proxy_module>
        ProxyPass "/healthz" "fcgi://127.0.0.1:9000"
    </IfModule>

    # Wait on php-fpm at least as long as PHP may run, so Apache doesn't 504 before
    # PHP's own timeout. ${SERVER_TIMEOUT} is an image ENV (default 30). Guarded by
    # IfModule for safety (mod_proxy is present on both distros: Debian via a2enmod,
    # Alpine via the apache2-proxy package installed in the Dockerfile).
    <IfModule proxy_module>
        ProxyTimeout ${SERVER_TIMEOUT}
    </IfModule>
</VirtualHost>
