worker_processes  auto;
# Brotli dynamic modules (installed per distro; same .so path on Debian and Alpine). We
# run our own rendered config, so these are the only load - no clash with the distro's
# stock nginx.conf module includes.
load_module /usr/lib/nginx/modules/ngx_http_brotli_filter_module.so;
load_module /usr/lib/nginx/modules/ngx_http_brotli_static_module.so;
# Level is rendered from ${NGINX_ERROR_LOG_LEVEL} (default warn) by the nginx s6 run
# script, since nginx cannot expand env vars itself. Logs go to the container's streams.
error_log  /dev/stderr  ${NGINX_ERROR_LOG_LEVEL};
pid        /run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;
    sendfile      on;

    # Response compression: brotli preferred, gzip fallback. nginx negotiates on the
    # client's Accept-Encoding and applies only one (gzip skips a response brotli already
    # encoded), so no double compression. brotli_static/gzip_static serve pre-compressed
    # .br/.gz siblings when present. Mirrors Caddy's `encode` on frankenphp.
    gzip              on;
    gzip_static       on;
    gzip_vary         on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_types        text/plain text/css text/xml text/javascript
                      application/json application/javascript application/xml
                      application/rss+xml image/svg+xml;
    brotli            on;
    brotli_static     on;
    brotli_comp_level 5;
    brotli_min_length 256;
    brotli_types      text/plain text/css text/xml text/javascript
                      application/json application/javascript application/xml
                      application/rss+xml image/svg+xml;

    server {
        listen       8080;
        server_name  _;
        # ${SERVER_ROOT} is substituted at container start (nginx cannot expand
        # env vars itself); see the nginx s6 run script.
        root         ${SERVER_ROOT};
        index        index.php index.html;

        # FPM ping health endpoint (default HEALTHCHECK_PATH). Handed to php-fpm with
        # SCRIPT_NAME matching ping.path (php-fpm.conf); FPM returns the ping response
        # itself (200), no PHP script runs. Exact-match so it never hits try_files.
        location = /healthz {
            include       /etc/nginx/fastcgi_params;
            fastcgi_pass  127.0.0.1:9000;
            fastcgi_param SCRIPT_NAME     /healthz;
            fastcgi_param SCRIPT_FILENAME /healthz;
        }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            # Never pass a non-existent .php path to FPM: without this a request like
            # /uploads/evil.jpg/x.php could reach FPM and, if security.limit_extensions
            # were ever relaxed, execute the wrong file (classic path-info attack).
            try_files $uri =404;
            include       /etc/nginx/fastcgi_params;
            fastcgi_pass  127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            # Wait on php-fpm at least as long as PHP may run, so nginx doesn't 504
            # before max_execution_time. Rendered by the run script (see below).
            fastcgi_read_timeout ${FASTCGI_READ_TIMEOUT}s;
        }
    }
}
