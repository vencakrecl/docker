# Debian-only drop-in (conf-enabled/*.conf, auto-included). On Debian the modules are
# enabled via a2enmod, the port via a ports.conf rewrite, and User/Group come from the
# base image's envvars (APACHE_RUN_USER/GROUP=www-data) - all in the Dockerfile. This
# file just pulls in the shared vhost. Alpine doesn't read conf-enabled, so it's inert
# there (its alpine.conf drop-in does the same job).
IncludeOptional /etc/apache2/fpm-vhost.conf
