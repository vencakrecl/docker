# Runtime checks for a running fpm-apache container (dgoss run ...).
# s6-overlay brings up php-fpm and Apache; the hello-world index.php is proxied
# to php-fpm and served at / (200), proving PHP executes end-to-end through Apache.
# No web-server process check: Apache's process is httpd on Alpine, apache2 on
# Debian. HTTP is used instead of a port check (Apache binds IPv6 on Alpine,
# IPv4 on Debian).
process:
  php-fpm:
    running: true
command:
  runs-as-non-root:
    exec: id -u
    exit-status: 0
    stdout:
      - "!/^0$/"
  php-cli-executes:
    exec: php -r 'echo 40 + 2;'
    exit-status: 0
    stdout: ["42"]
  # --- one test per env var: set it inline; php/php-fpm re-parse config each run.
  # These also prove the shared config is loaded (e.g. max_children=40 comes from
  # our env-driven common/php-fpm.conf; the base image would show its hardcoded 5)
  # and valid (php-fpm -tt exits 0). ---
  env-php-memory-limit:
    exec: env PHP_MEMORY_LIMIT=512M php -r 'echo ini_get("memory_limit");'
    exit-status: 0
    stdout: ["512M"]
  env-php-fpm-pm:
    exec: env PHP_FPM_PM=static php-fpm -tt
    exit-status: 0
    stderr: ["pm = static"]
  env-php-fpm-max-children:
    exec: env PHP_FPM_PM_MAX_CHILDREN=40 php-fpm -tt
    exit-status: 0
    stderr: ["pm.max_children = 40"]
  env-php-fpm-start-servers:
    exec: env PHP_FPM_PM_START_SERVERS=3 php-fpm -tt
    exit-status: 0
    stderr: ["pm.start_servers = 3"]
  env-php-fpm-min-spare-servers:
    exec: env PHP_FPM_PM_MIN_SPARE_SERVERS=2 php-fpm -tt
    exit-status: 0
    stderr: ["pm.min_spare_servers = 2"]
  env-php-fpm-max-spare-servers:
    exec: env PHP_FPM_PM_MAX_SPARE_SERVERS=5 php-fpm -tt
    exit-status: 0
    stderr: ["pm.max_spare_servers = 5"]
  env-php-fpm-max-requests:
    exec: env PHP_FPM_PM_MAX_REQUESTS=500 php-fpm -tt
    exit-status: 0
    stderr: ["pm.max_requests = 500"]
http:
  http://localhost:8080/:
    status: 200
    body: ["Hello, World!"]
    timeout: 5000
