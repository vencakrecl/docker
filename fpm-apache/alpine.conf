# Alpine-only drop-in, auto-loaded last by the stock httpd.conf's
# `IncludeOptional /etc/apache2/conf.d/*.conf`, so its last-wins directives (User/Group)
# override the stock ones. Runs the server non-root on :8080 and pulls in the shared
# vhost. proxy/proxy_fcgi come from the apache2-proxy package (conf.d/proxy.conf, sorted
# before this file); setenvif is loaded by stock httpd.conf. The Dockerfile comments out
# the stock `Listen 80` and file `CustomLog` - the two directives that accumulate rather
# than last-win, so an include can't override them. Debian doesn't read conf.d, so this
# file is inert there (its debian.conf drop-in + a2enmod/ports.conf path do the same job).
Listen 8080
User ${SERVER_USER}
Group ${SERVER_USER}
LoadModule rewrite_module modules/mod_rewrite.so
# Compression modules (mod_filter is stock-loaded; brotli is loaded by the apache2-brotli
# package's conf.d/brotli.conf). Guarded so we only load what isn't already loaded.
<IfModule !mod_deflate.c>
LoadModule deflate_module modules/mod_deflate.so
</IfModule>
<IfModule !mod_brotli.c>
LoadModule brotli_module modules/mod_brotli.so
</IfModule>
IncludeOptional /etc/apache2/fpm-vhost.conf
