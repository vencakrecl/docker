# Runtime checks for the dind -aws variant: the base dind checks (see goss.yaml)
# plus an AWS CLI probe. Run with `dgoss run --privileged` (GOSS_FILE=goss.aws.yaml).
# NB: goss renders this file through Go templating first, so avoid brace syntax here.
process:
  dockerd:
    running: true
command:
  runs-as-non-root:
    exec: id -u
    exit-status: 0
    stdout:
      - "!/^0$/"
  docker-server:
    exec: sh -c 'DOCKER_HOST=unix:///run/user/1000/docker.sock docker version'
    exit-status: 0
    stdout:
      - Server
  aws-cli:
    exec: aws --version
    exit-status: 0
    stdout:
      - aws-cli
