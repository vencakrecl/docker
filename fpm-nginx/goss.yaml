# Runtime checks for a running fpm-nginx container (dgoss run ...).
# s6-overlay brings up php-fpm and nginx; the hello-world index.php is served at /
# via the fastcgi path (200 + body proves php-fpm is up; a 502 would mean it's down).
process:
  php-fpm:
    running: true
  nginx:
    running: true
command:
  runs-as-non-root:
    exec: id -u
    exit-status: 0
    stdout:
      - "!/^0$/"
  php-cli-executes:
    exec: php -r 'echo 40 + 2;'
    exit-status: 0
    stdout: ["42"]
  # Default extension set baked in at build (two per install manager: docker-php-ext,
  # PECL, PIE). Downstream apps extend these by deriving + `helper` (see examples/wordpress).
  default-extensions:
    exec: php -m
    exit-status: 0
    stdout: ["mysqli", "bcmath", "redis", "apcu", "ds", "opentelemetry"]
  # The container HEALTHCHECK probe: GETs $HEALTHCHECK_PATH and exits 0 on 2xx,
  # exercising nginx -> php-fpm -> PHP end-to-end.
  healthcheck:
    exec: healthcheck
    exit-status: 0
  # Compression: brotli preferred (gzip fallback). Write a >min_length compressible asset
  # and assert the negotiated Content-Encoding is br - proves the brotli module loaded and
  # the config negotiates (a base-image change dropping the module would fail here).
  compression-brotli:
    exec: |
      head -c 1024 /dev/zero | tr '\0' x > ${SERVER_ROOT}/__goss_compress.css
      curl -s -D - -o /dev/null -H 'Accept-Encoding: br, gzip' http://127.0.0.1:8080/__goss_compress.css
    exit-status: 0
    stdout: ["Content-Encoding: br"]
  # fastcgi_read_timeout is rendered from SERVER_TIMEOUT (default 30) so nginx doesn't
  # 504 before PHP's limit.
  nginx-fastcgi-read-timeout:
    exec: grep -oE 'fastcgi_read_timeout [0-9]+s' /run/nginx.conf
    exit-status: 0
    stdout: ["fastcgi_read_timeout 30s"]
  # error_log level is rendered from NGINX_ERROR_LOG_LEVEL (default warn) into
  # /run/nginx.conf at start (like fastcgi_read_timeout above); assert the rendered default.
  nginx-error-log-level:
    exec: grep -oE 'error_log +/dev/stderr +[a-z]+;' /run/nginx.conf
    exit-status: 0
    stdout: ["/dev/stderr", "warn;"]
  # --- one test per env var: set it inline; php/php-fpm re-parse config each run.
  # These also prove the shared config is loaded (e.g. max_children=40 comes from
  # our env-driven common/php-fpm.conf; the base image would show its hardcoded 5)
  # and valid (php-fpm -tt exits 0). ---
  env-php-memory-limit:
    exec: env PHP_MEMORY_LIMIT=512M php -r 'echo ini_get("memory_limit");'
    exit-status: 0
    stdout: ["512M"]
  env-php-upload-max-filesize:
    exec: env PHP_UPLOAD_MAX_FILESIZE=64M php -r 'echo ini_get("upload_max_filesize");'
    exit-status: 0
    stdout: ["64M"]
  env-php-post-max-size:
    exec: env PHP_POST_MAX_SIZE=128M php -r 'echo ini_get("post_max_size");'
    exit-status: 0
    stdout: ["128M"]
  env-php-max-input-vars:
    exec: env PHP_MAX_INPUT_VARS=5000 php -r 'echo ini_get("max_input_vars");'
    exit-status: 0
    stdout: ["5000"]
  env-php-date-timezone:
    exec: env PHP_DATE_TIMEZONE=Europe/Prague php -r 'echo ini_get("date.timezone");'
    exit-status: 0
    stdout: ["Europe/Prague"]
  env-php-opcache-memory-consumption:
    exec: env PHP_OPCACHE_MEMORY_CONSUMPTION=256 php -r 'echo ini_get("opcache.memory_consumption");'
    exit-status: 0
    stdout: ["256"]
  env-php-opcache-max-accelerated-files:
    exec: env PHP_OPCACHE_MAX_ACCELERATED_FILES=32531 php -r 'echo ini_get("opcache.max_accelerated_files");'
    exit-status: 0
    stdout: ["32531"]
  env-php-opcache-interned-strings-buffer:
    exec: env PHP_OPCACHE_INTERNED_STRINGS_BUFFER=32 php -r 'echo ini_get("opcache.interned_strings_buffer");'
    exit-status: 0
    stdout: ["32"]
  env-php-opcache-validate-timestamps:
    exec: env PHP_OPCACHE_VALIDATE_TIMESTAMPS=0 php -r 'echo ini_get("opcache.validate_timestamps");'
    exit-status: 0
    stdout: ["0"]
  env-php-opcache-enable-cli:
    exec: env PHP_OPCACHE_ENABLE_CLI=1 php -r 'echo ini_get("opcache.enable_cli");'
    exit-status: 0
    stdout: ["1"]
  env-php-opcache-preload:
    exec: env PHP_OPCACHE_PRELOAD=/app/config/preload.php php -r 'echo ini_get("opcache.preload");'
    exit-status: 0
    stdout: ["/app/config/preload.php"]
  env-php-opcache-preload-user:
    exec: env PHP_OPCACHE_PRELOAD_USER=app php -r 'echo ini_get("opcache.preload_user");'
    exit-status: 0
    stdout: ["app"]
  env-php-realpath-cache-size:
    exec: env PHP_REALPATH_CACHE_SIZE=8192K php -r 'echo ini_get("realpath_cache_size");'
    exit-status: 0
    stdout: ["8192K"]
  env-php-realpath-cache-ttl:
    exec: env PHP_REALPATH_CACHE_TTL=600 php -r 'echo ini_get("realpath_cache_ttl");'
    exit-status: 0
    stdout: ["600"]
  # --- Error-logging knobs (common/php.ini): errors go to stderr, display_errors off by
  # default. Set inline, asserted via ini_get. error_reporting is set to a fixed number
  # (not E_ALL, whose numeric value is PHP-version-specific). ---
  env-php-log-errors:
    exec: env PHP_LOG_ERRORS=Off php -r 'echo ini_get("log_errors");'
    exit-status: 0
    stdout: ["Off"]
  env-php-error-log:
    exec: env PHP_ERROR_LOG=/tmp/php_errors.log php -r 'echo ini_get("error_log");'
    exit-status: 0
    stdout: ["/tmp/php_errors.log"]
  env-php-display-errors:
    exec: env PHP_DISPLAY_ERRORS=On php -r 'echo ini_get("display_errors");'
    exit-status: 0
    stdout: ["On"]
  env-php-display-startup-errors:
    exec: env PHP_DISPLAY_STARTUP_ERRORS=On php -r 'echo ini_get("display_startup_errors");'
    exit-status: 0
    stdout: ["On"]
  env-php-error-reporting:
    exec: env PHP_ERROR_REPORTING=0 php -r 'echo ini_get("error_reporting");'
    exit-status: 0
    stdout: ["0"]
  env-php-fpm-pm:
    exec: env PHP_FPM_PM=static php-fpm -tt
    exit-status: 0
    stderr: ["pm = static"]
  env-php-fpm-max-children:
    exec: env PHP_FPM_PM_MAX_CHILDREN=40 php-fpm -tt
    exit-status: 0
    stderr: ["pm.max_children = 40"]
  env-php-fpm-start-servers:
    exec: env PHP_FPM_PM_START_SERVERS=3 php-fpm -tt
    exit-status: 0
    stderr: ["pm.start_servers = 3"]
  env-php-fpm-min-spare-servers:
    exec: env PHP_FPM_PM_MIN_SPARE_SERVERS=2 php-fpm -tt
    exit-status: 0
    stderr: ["pm.min_spare_servers = 2"]
  env-php-fpm-max-spare-servers:
    exec: env PHP_FPM_PM_MAX_SPARE_SERVERS=5 php-fpm -tt
    exit-status: 0
    stderr: ["pm.max_spare_servers = 5"]
  env-php-fpm-max-requests:
    exec: env PHP_FPM_PM_MAX_REQUESTS=500 php-fpm -tt
    exit-status: 0
    stderr: ["pm.max_requests = 500"]
  # FPM logging knobs (common/php-fpm.conf): the base image already routes FPM to stderr;
  # these prove our overrides load. php-fpm -tt dumps the effective config to stderr.
  env-php-fpm-log-level:
    exec: env PHP_FPM_LOG_LEVEL=debug php-fpm -tt
    exit-status: 0
    stderr: ["log_level = DEBUG"]   # php-fpm's config dump upper-cases the level
  env-php-fpm-catch-workers-output:
    exec: env PHP_FPM_CATCH_WORKERS_OUTPUT=no php-fpm -tt
    exit-status: 0
    stderr: ["catch_workers_output = no"]
  env-php-fpm-access-log:
    exec: env PHP_FPM_ACCESS_LOG=/tmp/fpm-access.log php-fpm -tt
    exit-status: 0
    stderr: ["access.log = /tmp/fpm-access.log"]
http:
  # Default HEALTHCHECK target: php-fpm ping (no app code runs), 200 + "pong".
  http://localhost:8080/healthz:
    status: 200
    body: ["pong"]
    timeout: 5000
  # End-to-end: / serves index.php through nginx -> php-fpm -> PHP.
  http://localhost:8080/:
    status: 200
    body: ["Hello, World!"]
    timeout: 5000
