; WordPress-oriented limits. WordPress documents these directives but publishes no
; numeric table (https://developer.wordpress.org/advanced-administration/performance/php/);
; the values below are common community defaults. Ordering rules that WordPress relies on:
;   post_max_size >= upload_max_filesize, and memory_limit >= post_max_size.
; max_input_vars matters for large menus/widgets - PHP silently truncates POST data above it.
memory_limit = 256M
upload_max_filesize = 64M
post_max_size = 128M
max_input_vars = 3000
max_execution_time = 300
max_input_time = 300
