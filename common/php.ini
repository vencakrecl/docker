; Shared PHP configuration, copied into $PHP_INI_DIR/conf.d on every PHP image.
;
; PHP expands ${...} to the current environment when it parses ini files at
; startup, and supports a shell-style ${VAR:-default} fallback. So every setting
; here carries its own default and is overridable at runtime with no rebuild, e.g.
; `docker run -e PHP_MEMORY_LIMIT=512M ...`. Defaults match PHP's own (bar an
; explicit UTC timezone); per-framework tuning lives in examples/<fw>/php.ini.
; To add a knob: add `key = ${PHP_ENV_VAR:-default}` here and an env-* goss test.

memory_limit = ${PHP_MEMORY_LIMIT:-128M}
upload_max_filesize = ${PHP_UPLOAD_MAX_FILESIZE:-2M}
post_max_size = ${PHP_POST_MAX_SIZE:-8M}
max_input_vars = ${PHP_MAX_INPUT_VARS:-1000}
date.timezone = ${PHP_DATE_TIMEZONE:-UTC}
