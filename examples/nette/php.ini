; Nette-oriented tuning. Nette's docs defer to php.net for directive values
; (https://doc.nette.org/en/configuring), so this is a general OPcache baseline for
; PHP 8 (https://www.php.net/manual/en/opcache.configuration.php). Keep
; opcache.save_comments = 1 so annotation/attribute tooling (e.g. Doctrine) keeps working.
; Dev example: opcache.validate_timestamps stays at the default (1); set 0 in production.
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.save_comments = 1
opcache.enable_cli = 0
