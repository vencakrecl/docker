; Shared PHP-FPM pool tuning for the fpm images (fpm-nginx, fpm-apache).
; Copied to /usr/local/etc/php-fpm.d/zzz-common.conf so it loads after the base
; www.conf / zz-docker.conf and its values win (php-fpm merges [www] across files).
;
; php-fpm expands ${...} from the environment at startup and supports a
; ${VAR:-default} fallback (verified), so the process-manager settings below are
; overridable at runtime with no rebuild - e.g. `-e PHP_FPM_PM_MAX_CHILDREN=40`.
; frankenphp embeds PHP and does not use php-fpm, so it does not get this file.

; Logging. The base php:*-fpm image already points FPM's error_log and access.log at
; /proc/self/fd/2 (stderr) and sets catch_workers_output=yes, so PHP worker output and
; FPM errors reach `docker logs`. These knobs re-declare that (our file loads last, so it
; wins) and make it overridable: raise/lower FPM verbosity, or send access.log to
; /dev/null to silence it.
[global]
log_level = ${PHP_FPM_LOG_LEVEL:-notice}

; Note: in dynamic mode php-fpm requires
; min_spare_servers <= start_servers <= max_spare_servers, so if you raise
; PHP_FPM_PM_START_SERVERS also raise PHP_FPM_PM_MAX_SPARE_SERVERS to match, or
; php-fpm refuses to start.
[www]
pm = ${PHP_FPM_PM:-dynamic}
pm.max_children = ${PHP_FPM_PM_MAX_CHILDREN:-20}
pm.start_servers = ${PHP_FPM_PM_START_SERVERS:-2}
pm.min_spare_servers = ${PHP_FPM_PM_MIN_SPARE_SERVERS:-1}
pm.max_spare_servers = ${PHP_FPM_PM_MAX_SPARE_SERVERS:-3}
pm.max_requests = ${PHP_FPM_PM_MAX_REQUESTS:-1000}
catch_workers_output = ${PHP_FPM_CATCH_WORKERS_OUTPUT:-yes}
access.log = ${PHP_FPM_ACCESS_LOG:-/proc/self/fd/2}

; FPM ping endpoint - the default container HEALTHCHECK target. FPM answers this path
; itself (returns ping.response, HTTP 200) without dispatching to a PHP script, so the
; probe validates that php-fpm + the web server accept connections, cheaply and
; independently of the app/docroot. The web server routes /healthz here (nginx
; location / apache ProxyPass) with SCRIPT_NAME=/healthz to match ping.path. To probe
; the app end-to-end instead, set HEALTHCHECK_PATH=/ (or your app's route, e.g. /up).
ping.path = /healthz
ping.response = pong
